onboarding = false

[theme]
name = "vesper"

[keys]
prefix = "ctrl+a"                          # default: "ctrl+b"

# reload config (tmux: prefix r); resize moved off r to keep it available
reload_config = "prefix+r"                 # default: "prefix+shift+r"
resize_mode = "prefix+shift+r"             # default: "prefix+r"

# session/window tree picker (tmux: prefix C-w = choose-tree)
workspace_picker = "prefix+ctrl+w"         # default: "prefix+w"

# --- Workspaces  (tmux sessions) ---
new_workspace = "prefix+shift+n"           # tmux N        | default: "prefix+shift+n" (unchanged)
previous_workspace = "prefix+shift+h"      # tmux H / K    | default: "" (unset)
next_workspace = "prefix+shift+l"          # tmux J / L / O| default: "" (unset)
close_workspace = "prefix+shift+x"         # tmux X        | default: "prefix+shift+d"

# --- Tabs  (tmux windows) ---
new_tab = "prefix+ctrl+n"                  # tmux C-n      | default: "prefix+c"
previous_tab = "prefix+ctrl+k"             # tmux C-k      | default: "prefix+p"
next_tab = "prefix+ctrl+j"                 # tmux C-j / C-o| default: "prefix+n"
close_tab = "prefix+ctrl+x"                # tmux C-x      | default: "prefix+shift+x"

# --- Panes ---
split_vertical = "prefix+|"                # tmux |        | default: "prefix+v"     (split right)
split_horizontal = "prefix+_"              # tmux _        | default: "prefix+minus" (split down)
close_pane = "prefix+x"                    # tmux x        | default: "prefix+x" (unchanged)
focus_pane_left = "prefix+h"               # tmux h/j/k/l  | default: "prefix+h" (unchanged)
focus_pane_down = "prefix+j"               #               | default: "prefix+j" (unchanged)
focus_pane_up = "prefix+k"                 #               | default: "prefix+k" (unchanged)
focus_pane_right = "prefix+l"              #               | default: "prefix+l" (unchanged)

# herd.nvim return trip: Ctrl-a Tab to jump back to the nvim pane
last_pane = "prefix+tab"                   # default: "" (unset). NOTE: shadows cycle_pane_next below.

# ── herdr defaults NOT overridden above (uncomment + edit to customise) ──────────
# help                     = "prefix+?"        # show every active binding
# settings                 = "prefix+s"
# detach                   = "prefix+q"
# goto                     = "prefix+g"
# toggle_sidebar           = "prefix+b"
# open_notification_target = "prefix+o"
# edit_scrollback          = "prefix+e"        # copy mode also opens with: prefix+[
# zoom                     = "prefix+z"        # fullscreen toggle (used by herd.nvim)
# rename_workspace         = "prefix+shift+w"
# rename_tab               = "prefix+shift+t"
# rename_pane              = "prefix+shift+p"
# switch_tab               = "prefix+1..9"     # indexed; or see [keys.indexed] below
# cycle_pane_next          = "prefix+tab"      # shadowed by last_pane = "prefix+tab" above
# cycle_pane_previous      = "prefix+shift+tab"
# new_worktree             = "prefix+shift+g"
# open_worktree            = ""                # unset by default
# remove_worktree          = ""                # unset by default; opens confirmation
# previous_agent           = ""                # unset
# next_agent               = ""                # unset
# focus_agent              = ""                # indexed, e.g. "prefix+alt+1..9"
# switch_workspace         = ""                # indexed, e.g. "prefix+shift+1..9"
# remote_image_paste       = "ctrl+v"          # only active in `herdr --remote`
#
# Navigate-mode movement (non-prefix; only while navigate mode is open):
# navigate_workspace_up    = "up"
# navigate_workspace_down  = "down"
# navigate_pane_left       = "h"
# navigate_pane_down       = "j"
# navigate_pane_up         = "k"
# navigate_pane_right      = "l"
#
# Custom commands (run a shell/pane command from a binding):
# [[keys.command]]
# key = "prefix+alt+g"
# type = "pane"        # "pane" = temp pane that closes on exit; "shell" = detached
# command = "lazygit"
